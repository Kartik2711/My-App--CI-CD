version: 0.0
os: linux

files:
  - source: .
    destination: /home/ec2-user/My-App--CI-CD
    overwrite: true

permissions:
  - object: /home/ec2-user/My-App--CI-CD
    pattern: "**"
    owner: ec2-user
    group: ec2-user
    mode: 755

hooks:
  BeforeInstall:
    - location: cleanup.sh
      timeout: 300
      runas: ec2-user

  AfterInstall:
    - location: deploy.sh
      timeout: 300
      runas: ec2-user